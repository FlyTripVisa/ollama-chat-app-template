<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		
			    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #010101; font-family: 'Inter', sans-serif; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-wrapper { max-width: 500px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .glass-header { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; background: rgba(1, 1, 3, 0.95); border-bottom: 1px solid #ff550033; }
        .logo { font-size: 15px; font-weight: 900; color: #ff5500; }
        
        #chatContainer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { padding: 10px 14px; border-radius: 16px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg-ai { background: #15151a; align-self: flex-start; border: 1px solid #222; }
        .msg-user { background: #ff5500; color: #000; align-self: flex-end; font-weight: 600; }
        
        /* Compact Input Area */
        .input-area { padding: 8px; background: #09090c; display: flex; align-items: center; gap: 6px; border-top: 1px solid #222; }
        .input-box { flex: 1; background: #111; border: 1px solid #333; border-radius: 18px; padding: 8px 12px; color: #fff; outline: none; font-size: 14px; }
        .btn-icon { background: #1a1a1f; border: 1px solid #333; color: #ff5500; padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 14px; }
        .btn-send { background: #ff5500; border: none; color: #000; padding: 8px 16px; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .btn-send:active { transform: scale(0.95); }
        
        .listening { animation: pulse 1.5s infinite; background: #ff5500 !important; color: #000 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
	</head>
	<body>
		<header>
			<h1>Cloudflare AI Chat</h1>
			<p>Powered by Cloudflare Workers AI</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>
						Hello! I'm an LLM chat app powered by Cloudflare Workers AI. How can
						I help you today?
					</p>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				AI is thinking...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Type your message here..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2025</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
